# Yang 4DGS config for HyperNeRF slice-banana, mirroring configs/dnerf/jumpingjacks.yaml.
#
# Notes:
#   - source_path / model_path / iterations are interpolated by
#     scripts/train_modal_4dgs_yang.py at container start (placeholders below).
#   - resolution=1: the rectifier already downsamples to 4x; we don't want
#     Yang's loadCam to downsample again.
#   - num_pts=15000: matches our SH3 14k init density (NeRFies ships ~15k
#     COLMAP points in slice-banana's points.npy). Yang's reader will subsample
#     if points.npy is denser; here it shouldn't trigger.
#   - batch_size=2 to fit L4 memory at 134x240 (D3DGS run on the same GPU
#     processed one camera at a time -- batched gradients in Yang are 2x VRAM).
#   - time_duration=[0.0, 1.0]: matches our HyperNeRF reader's normalization
#     (time_id / (T-1)) and Yang's dnerf default.
#   - eval_shfs_4d=True: enables 4D-SH per Yang's main paper recipe.

gaussian_dim: 4
time_duration: [0.0, 1.0]
num_pts: 15_000
num_pts_ratio: 1.0
rot_4d: True
force_sh_3d: False
batch_size: 2
exhaust_test: True

ModelParams:
  sh_degree: 3
  source_path: "__SOURCE_PATH__"
  model_path: "__MODEL_PATH__"
  images: "images"
  resolution: __RESOLUTION__
  white_background: False
  data_device: "cuda"
  eval: True
  extension: ".png"
  num_extra_pts: 0
  loaded_pth: ""
  frame_ratio: 1
  dataloader: False

PipelineParams:
  convert_SHs_python: False
  compute_cov3D_python: False
  debug: False
  env_map_res: 0
  env_optimize_until: 1000000000
  env_optimize_from: 0
  eval_shfs_4d: True

OptimizationParams:
  iterations: __ITERATIONS__
  position_lr_init: 0.00016
  position_t_lr_init: -1.0
  position_lr_final: 0.0000016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: __ITERATIONS__
  feature_lr: 0.0025
  opacity_lr: 0.05
  scaling_lr: 0.005
  rotation_lr: 0.001
  percent_dense: 0.01
  lambda_dssim: 0.2
  thresh_opa_prune: 0.005
  densification_interval: 100
  opacity_reset_interval: 3000
  densify_from_iter: 500
  densify_until_iter: 10_000
  densify_grad_threshold: 0.0002
  densify_grad_t_threshold: 0.000005   # = 0.0002 / 40, written as float so OmegaConf parses it
  densify_until_num_points: -1
  final_prune_from_iter: -1
  sh_increase_interval: 1000
  lambda_opa_mask: 0.0
  lambda_rigid: 0.0
  lambda_motion: 0.0
